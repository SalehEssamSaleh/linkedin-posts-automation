name: Daily LinkedIn Keyword Search

on:
  schedule:
    # 05:30 UTC daily = 08:30 Riyadh (AST, UTC+3, no DST)
    - cron: '30 5 * * *'
  workflow_dispatch: {}

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily search
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          # Optional — leave the secret unset in repo settings to skip that source
          ALERT_RSS_FEEDS_JSON: ${{ secrets.ALERT_RSS_FEEDS_JSON }}
          SEARXNG_INSTANCE_URL: ${{ secrets.SEARXNG_INSTANCE_URL }}
          MOJEEK_API_KEY: ${{ secrets.MOJEEK_API_KEY }}
        run: python main.py
